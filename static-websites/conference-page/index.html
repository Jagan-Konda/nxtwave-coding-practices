<body>
    <div id="sectionConferenceHP">
        <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/conference-img.png" class="conference-home-top-section" />
        <div class="conference-text-container">
            <h1 class="conference-main-heading"> The Things <br />
                Conference</h1>
            <p class="conference-description"> Redefining the future of IoT with <br />

        </div>
    </div>

    <div id="sectionConferenceDP" class="conference-details-section">

        <div class="d-flex flex-row justify-content-center conference-details-margin">

                <p class="conference-description"> Workshops</p>
            </div>
        </div>

            <div class="conference-text-container">
                <h1 class="conference-main-heading">120+</h1>
                <p class="conference-description"> Speakers</p>
            </div>
            <div class="conference-text-container">
                <h1 class="conference-main-heading">10+</h1>
                <p class="conference-description"> Countries</p>
            </div>
        </div>
        <div class=" d-flex flex-row justify-content-center">
