<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
</head>

<body>
    <div>
        <div class="covid-bg-container ">
            <div class="covid-bg-card">
                <div class="d-flex flex-row">
                    <div>
                        <h1 class="covid-main-heading"> All youneed to know about COVID-19</h1>
                        <button class="btn btn-primary"> Know more</button>
                    </div>
                    <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/medicalcare-img.png" class="covid-main-image" />
                </div>

                <div class="covid-test-card d-flex flex-row">
                    <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/coronavirus-img.png" class="covid-test-card-image-container" />
                    <div class="covid-test-card-text-container">
                        <h1 class="covid-test-card-heading"> COVID-19 TEST</h1>
                        <p class="covid-test-card-description"> If you think you have been exposed to novel coronovirus (COVID-19)...more</p>
                    </div>
                </div>
                <h1 class="covid-sub-heading"> Symptoms</h1>
                <div class=" d-flex flex-row">
                    <div class="covid-drycough-card">
                        <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/cough-img.png" />
                        <p> Dry Cough</p>
                    </div>
                    <div class="covid-high-fever-card">
                        <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/fever-img.png" />
                        <p> High Fever</p>
                    </div>
                    <div class="covid-headache-card">
                        <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/headache-img.png" />
                        <p> Headache</p>
                    </div>
                </div>
                <h1 class="covid-sub-heading"> Videos</h1>
                <div class="covid-videos-card">
                    <div class="d-flex flex-row">
                        <img src="https://d2clawv67efefq.cloudfront.net/ccbp-static-website/doctor-img.png" class="covid-videos-card-image-container" />
                        <div class="covid-videos-card-text-container">
                            <h1 class="covid-videos-card-heading"> To prevent the spread of ...</h1>
                            <p class="covid-videos-card-description"> If you think you have been exposed to novel corona virus (COVID-19)</p>
                        </div>
                    </div>
                    <div class="d-flex flex-row justify-content-center">
                        <button class="btn btn-primary"> Watch Video</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
